<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crafty Haven Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fdf6f0;
        }

        header {
            background-color: #d96c75;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #f4a6ae;
            padding: 10px;
            text-align: center;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 40px;
            background-color: #ffe3e6;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .product {
            background: white;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product img {
            width: 100%;
            border-radius: 10px;
        }

        .product h3 {
            margin: 10px 0 5px;
        }

        .product p {
            color: #555;
        }

        .product button {
            background-color: #d96c75;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #d96c75;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Crafty Haven</h1>
    <p>Handmade Crafts & Creative Goods</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Welcome to Our Craft Shop</h2>
    <p>Discover unique handmade items made with love.</p>
</section>

<section class="products">
    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Handmade Candle">
        <h3>Handmade Candle</h3>
        <p>$10</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Knitted Scarf">
        <h3>Knitted Scarf</h3>
        <p>$15</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Decor Vase">
        <h3>Decor Vase</h3>
        <p>$20</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Art Painting">
        <h3>Art Painting</h3>
        <p>$25</p>
        <button>Buy Now</button>
    </div>
</section>

<footer>
    <p>© 2026 Crafty Haven | All Rights Reserved</p>
</footer>

</body>
</html>
